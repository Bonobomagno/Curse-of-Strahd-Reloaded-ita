name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/add-github-pages-sSXQi

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/configure-pages@v5

      - name: Clone Quartz
        run: |
          git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: /tmp/quartz

      - name: Initialize Quartz project
        run: npx quartz create -X new -l shortest
        working-directory: /tmp/quartz

      - name: Apply shared theme
        run: |
          cp .github/quartz/custom.scss /tmp/quartz/quartz/styles/custom.scss

      - name: Create final site directory
        run: mkdir -p /tmp/final-site

      # --- Italian Build (site root) ---
      - name: Configure Italian build
        run: |
          cp .github/quartz/quartz.config.it.ts /tmp/quartz/quartz.config.ts
          cp .github/quartz/quartz.layout.it.ts /tmp/quartz/quartz.layout.ts

      - name: Copy Italian content
        run: |
          rm -rf /tmp/quartz/content
          cp -r it /tmp/quartz/content

      - name: Build Italian site
        run: npx quartz build -o /tmp/quartz/_site -v
        working-directory: /tmp/quartz

      - name: Move Italian output to site root
        run: |
          cp -r /tmp/quartz/_site/* /tmp/final-site/
          rm -rf /tmp/quartz/_site

      # --- Clean Quartz cache between builds ---
      - name: Clean Quartz cache
        run: |
          rm -rf /tmp/quartz/.quartz-cache

      # --- English Build (site.com/en/) ---
      - name: Configure English build
        run: |
          cp .github/quartz/quartz.config.en.ts /tmp/quartz/quartz.config.ts
          cp .github/quartz/quartz.layout.en.ts /tmp/quartz/quartz.layout.ts

      - name: Copy English content
        run: |
          rm -rf /tmp/quartz/content
          cp -r en /tmp/quartz/content

      - name: Build English site
        run: npx quartz build -o /tmp/quartz/_site -v
        working-directory: /tmp/quartz

      - name: Move English output to /en/ subpath
        run: |
          mkdir -p /tmp/final-site/en
          cp -r /tmp/quartz/_site/* /tmp/final-site/en/
          rm -rf /tmp/quartz/_site

      # --- Deploy ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/final-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
