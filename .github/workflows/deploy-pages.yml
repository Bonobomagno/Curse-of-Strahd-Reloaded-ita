name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/add-github-pages-sSXQi

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/configure-pages@v5

      - name: Build with Quartz
        uses: konstfish/quartz-build-action@v7
        with:
          source: .
          page_title: "Curse of Strahd: Reloaded (ITA)"
          quartz_config: .github/quartz/quartz.config.ts
          quartz_layout: .github/quartz/quartz.layout.ts
          quartz_custom_css: .github/quartz/custom.scss

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
