site_name: "Curse of Strahd: Reloaded (ITA)"
site_description: Guida completa per Dungeon Master alla campagna Curse of Strahd
docs_dir: docs
site_dir: site

theme:
  name: material
  language: it
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Passa al tema scuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Passa al tema chiaro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate

plugins:
  - search:
      lang: it
  - callouts
  - roamlinks

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - publish.css

nav:
  - Home: "Introduction/A DM's Guide to Curse of Strahd.md"
  - Introduzione:
      - "Guida per il DM": "Introduction/A DM's Guide to Curse of Strahd.md"
